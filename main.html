<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIMS-MD Tools</title>
  <link rel="shortcut icon" href="https://yourdomain.com/favicon.ico" type="image/x-icon" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet" />

  <!-- Optional Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "url": "https://railway.app",
    "logo": "https://files.catbox.moe/ktqas9.jpg"
  }
  </script>

  <style>
    body {
      background: linear-gradient(135deg, #0d0d0d, #1c1c1c);
      color: #ffffff;
      font-family: 'Outfit', sans-serif;
      height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h3 {
      margin-bottom: 20px;
      font-size: 1.8rem;
      animation: fadeIn 2s ease-in-out;
    }

    .button-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .button {
      width: 180px;
      height: 45px;
      background-color: #4caf50; /* Changed to match audio button style */
      color: white; /* Changed to white for contrast */
      font-weight: 700;
      border: none;
      border-radius: 12px;
      box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
      cursor: pointer;
      transition: background-color 3.6s ease, box-shadow 0.6s ease, transform 0.6s ease;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 10px 0;
      transform: perspective(500px) rotateX(0deg) rotateY(0deg);
    }

    .button:hover {
      background-color: #45a049;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
      transform: perspective(500px) rotateX(10deg) rotateY(10deg);
    }

    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      background-color: #111;
      color: #aaa;
      text-align: center;
      padding: 10px 0;
      font-size: 14px;
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(-10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="button-container">
    <h3>AIMS(SIGMA-MD) 👻</h3>

    <a href="/pair" class="button" target="_blank">PAIRING CODE</a>
    <a href="/qr" class="button" target="_blank">QR CODE</a>
    <a href="https://github.com/YAMAL-YENG/AIMS-MD/fork" class="button" target="_blank">AIMS-MD </a>
    <a href="https://whatsapp.com" class="button" target="_blank">WhatsApp</a>
    <a href="https://wa.me/254769677305/" class="button" target="_blank">ERROR</a>
  </div>

  <footer>
    HACKLINK TECH.INC &copy; <span id="currentYear"></span>
  </footer>

  <!-- Audio element - autoplay -->
  <audio id="background-audio" src="https://files.catbox.moe/w2j17k.m4a" autoplay loop></audio>

  <script>
    document.getElementById("currentYear").textContent = new Date().getFullYear();

    // Attempt to play audio on page load (for browsers that block autoplay without interaction)
    const audio = document.getElementById('background-audio');
    window.addEventListener("load", () => {
      audio.play().catch(() => {
        // Autoplay blocked - fallback: user interaction required
        console.log("Autoplay enabled.");
      });
    });
  </script>
</body>
</html>
