<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIMS-MD Tools</title>
  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #111;
      font-family: 'Outfit', sans-serif;
      color: white;
      overflow: hidden;
      position: relative;
      flex-direction: column;
    }

    #particles-js {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .frame {
      width: 90%;
      max-width: 420px;
      padding: 30px 20px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      text-align: center;
      box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
    }

    .typing-effect {
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 2px;
      white-space: nowrap;
      overflow: hidden;
      display: inline-block;
      animation: typing 8s steps(50) infinite, randomColor 8s linear infinite;
      text-transform: uppercase;
    }

    @keyframes typing {
      0% { width: 0%; }
      100% { width: 100%; }
    }

    @keyframes randomColor {
      0% { color: #FF4500; }
      25% { color: #4caf50; }
      50% { color: #1e90ff; }
      75% { color: #ff9800; }
      100% { color: #9c27b0; }
    }

    .btn {
      padding: 12px;
      font-size: 14px;
      font-weight: bold;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      border-radius: 10px;
      color: white;
      background-color: #4caf50;
      transition: background-color 3.6s ease, box-shadow 0.6s ease, transform 0.6s ease;
      box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
      transform: perspective(500px) rotateX(0deg) rotateY(0deg);
      text-decoration: none;
      display: block;
      margin: 10px 0;
    }

    .btn:hover {
      transform: perspective(500px) rotateX(10deg) rotateY(10deg);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      color: #ccc;
      font-size: 0.8rem;
    }

    p {
      font-size: 0.85rem;
      margin: 10px 0;
    }
  </style>
</head>
<body>

  <div id="particles-js"></div>

  <div class="frame">
    <div class="typing-effect">Welcome to AIMS-MD Tools 👻</div>

    <a href="/pair" class="btn" target="_blank">Pairing Code</a>
    <a href="/qr" class="btn" target="_blank">QR Code</a>
    <a href="https://github.com/YAMAL-YENG/AIMS-MD/fork" class="btn" target="_blank">AIMS-MD on GitHub</a>
    <a href="https://whatsapp.com" class="btn" target="_blank">Join WhatsApp</a>
    <p>Any error? Click the error button below.</p>
    <a href="https://wa.me/254769677305" class="btn" target="_blank">Report Error</a>

    <div class="footer">
      HACKLINK TECH IN.C &copy; <span id="currentYear"></span>
    </div>
  </div>

  <script>
    // Set current year
    document.getElementById("currentYear").textContent = new Date().getFullYear();

    // Initialize Particles
    particlesJS('particles-js', {
      "particles": {
        "number": { "value": 120, "density": { "enable": true, "value_area": 800 } },
        "color": { "value": "#FF4500" },
        "shape": { "type": "circle" },
        "opacity": { "value": 0.4, "random": true },
        "size": { "value": 5, "random": true },
        "line_linked": { "enable": true, "distance": 120, "color": "#FF4500", "opacity": 0.3, "width": 1 },
        "move": { "enable": true, "speed": 5, "random": true }
      },
      "interactivity": {
        "detect_on": "canvas",
        "events": {
          "onhover": { "enable": true, "mode": "repulse" },
          "onclick": { "enable": true, "mode": "push" }
        }
      },
      "retina_detect": true
    });

    // Button color changes
    const colors = ["#FF4500", "#4caf50", "#1e90ff", "#ff9800", "#9c27b0", "#00bcd4", "#f44336"];
    function changeColors() {
      document.querySelectorAll('.btn').forEach(btn => {
        btn.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
      });
    }
    setInterval(changeColors, 3600);
  </script>
</body>
</html>
